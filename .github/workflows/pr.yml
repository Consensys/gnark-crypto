on: pull_request
name: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: 1.25.x # NB! when updating also update matrix, we cannot refer to env variables in the matrix
  GOLANGCI_LINT_VERSION: v2.10.1

jobs:
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2 # nonpinned - official GH action
        with:
          fetch-depth: 0
      - name: install Go
        uses: actions/setup-go@v6.3.0 # nonpinned - official GH action
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: gofmt
        run: if [[ -n $(gofmt -l .) ]]; then echo "please run gofmt"; exit 1; fi
      - name: goimports
        run: if [[ -n $(go tool goimports -l .) ]]; then echo "please run goimports"; exit 1; fi
      - name: generated files should not be modified
        run: |
          go generate ./...
          git update-index --assume-unchanged go.mod
          git update-index --assume-unchanged go.sum
          if [[ -n $(git status --porcelain) ]]; then echo "git repo is dirty after running go generate -- please don't modify generated files"; echo $(git diff);echo $(git status --porcelain); exit 1; fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 #v9.2.0 pinned
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: -v --timeout=5m

  test:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-xxl
    needs: staticcheck
    permissions:
      pull-requests: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
      - name: install Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: install deps
        run: |
          go install golang.org/x/tools/cmd/goimports@latest && go install github.com/klauspost/asmfmt/cmd/asmfmt@latest

      # Install gotestfmt on the VM running the action.
      - name: Set up gotestfmt
        uses: gotesttools/gotestfmt-action@8b4478c7019be847373babde9300210e7de34bfb #v2.2.0 pinned
        with:
          # Optional: pass GITHUB_TOKEN to avoid rate limiting.
          token: ${{ secrets.GITHUB_TOKEN }}

      # Run tests with nice formatting. Save the original log in /tmp/gotest.log
      - name: Run tests
        run: |
          set -euo pipefail
          go test -json -v -short -timeout=30m ./... 2>&1 | gotestfmt -hide=all |  tee /tmp/gotest.log
          go test -json -v -tags=purego -timeout=30m ./... 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./ecc/bn254/... 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./field/goldilocks 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./field/koalabear 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./field/babybear 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log

  slack-notification:
    needs: [staticcheck, test]
    if: always()
    uses: ./.github/workflows/slack-notifications.yml
    with:
      status: ${{ (needs.staticcheck.result == 'success' && needs.test.result == 'success') && 'success' || 'failure' }}
      actor: ${{ github.actor }}
      repository: ${{ github.repository }}
      branch: ${{ github.head_ref || github.ref_name }}
      run_id: ${{ github.run_id }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
