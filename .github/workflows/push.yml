on:
  push:
    branches:
      - "master"
name: push_master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: 1.25.x # NB! when updating also update matrix, we cannot refer to env variables in the matrix
  GOLANGCI_LINT_VERSION: v2.10.1

jobs:
  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: gofmt
        run: if [[ -n $(gofmt -l .) ]]; then echo "please run gofmt"; exit 1; fi
      - name: goimports
        run: if [[ -n $(go tool goimports -l .) ]]; then echo "please run goimports"; exit 1; fi
      - name: generated files should not be modified
        run: |
          go generate ./...
          git update-index --assume-unchanged go.mod
          git update-index --assume-unchanged go.sum
          if [[ -n $(git status --porcelain) ]]; then echo "git repo is dirty after running go generate -- please don't modify generated files"; echo $(git diff);echo $(git status --porcelain); exit 1; fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 #v9.2.0 pinned
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: -v --timeout=5m

  test:
    strategy:
      matrix:
        go-version: [1.25.x]
        os:
          [
            gha-runner-scale-set-ubuntu-24-amd64-xxl,
            windows-latest,
            macos-latest,
          ]
    runs-on: ${{ matrix.os }}
    needs:
      - staticcheck
    outputs:
      failures: ${{ steps.generate-job-summary.outputs.failures }}
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2 # nonpinned - official GH action
      - name: install Go
        uses: actions/setup-go@v6.4.0 # nonpinned - official GH action
        with:
          go-version: ${{ matrix.go-version }}

      # Install gotestfmt on the VM running the action.
      - name: Set up gotestfmt
        uses: gotesttools/gotestfmt-action@eba2ac97f623e866e7b1b117c99f18b43cd36d18 #v2.2.0 pinned
        with:
          # Optional: pass GITHUB_TOKEN to avoid rate limiting.
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test (windows / mac)
        # on macOS CI / Windows CI we avoid running the std/ tests (they are run on ubuntu CI)
        if: startsWith(matrix.os, 'gha-runner-scale-set-ubuntu') == false
        run: |
          go test -short -v -timeout=60m ./...
      - name: Test (ubuntu - race and solc)
        if: startsWith(matrix.os, 'gha-runner-scale-set-ubuntu') == true
        run: |
          set -euo pipefail
          go test -json -v -timeout=30m ./... 2>&1 | gotestfmt -hide=all | tee /tmp/gotest.log
          go test -json -v -tags=purego -timeout=30m ./... 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          go test -json -v -race -timeout=30m ./ecc/bn254/... 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./ecc/bn254/... 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./field/goldilocks 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./field/koalabear 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log
          GOARCH=386 go test -json -short -v -timeout=30m ./field/babybear 2>&1 | gotestfmt -hide=all | tee -a /tmp/gotest.log

  slack-notification:
    needs: [staticcheck, test]
    if: always()
    uses: ./.github/workflows/slack-notifications.yml
    with:
      status: ${{ (needs.staticcheck.result == 'success' && needs.test.result == 'success') && 'success' || 'failure' }}
      actor: ${{ github.actor }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      run_id: ${{ github.run_id }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
